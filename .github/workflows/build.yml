name: build

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    # Windows runner is required: the library targets net48 / net481,
    # which only build against the .NET Framework reference assemblies.
    runs-on: windows-latest

    permissions:
      contents: read
      # Required for NuGet trusted publishing (OIDC token exchange).
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Restore
        # --locked-mode fails the build if a packages.lock.json is missing or
        # out of date, guaranteeing reproducible, pinned dependency restores.
        run: dotnet restore src/Serialize.Linq.sln --locked-mode

      - name: Build
        run: dotnet build src/Serialize.Linq.sln -c Release --no-restore

      - name: Test
        run: dotnet test src/Serialize.Linq.sln -c Release --no-build --verbosity normal

      - name: Pack
        run: dotnet pack src/Serialize.Linq/Serialize.Linq.csproj -c Release --no-build -o artifacts

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nupkg
          path: artifacts/*.nupkg
          if-no-files-found: error

      # Trusted publishing: exchange the GitHub OIDC token for a short-lived
      # NuGet API key. No long-lived secret required.
      - name: NuGet login (trusted publishing)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        id: nuget-login
        uses: NuGet/login@v1
        with:
          user: esskar

      - name: Publish to NuGet
        # Deploy only on pushes to main (mirrors the previous AppVeyor behaviour).
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        shell: pwsh
        # Publishes the package version from the csproj <Version> as-is; the
        # version is never overridden. --skip-duplicate means an already-published
        # version is skipped rather than overwritten, so only a bumped <Version>
        # results in a new release.
        #
        # Expand the glob explicitly: neither dotnet nuget push nor PowerShell
        # expands a wildcard argument, so pass each resolved file path. The
        # matching .snupkg is pushed automatically alongside its .nupkg.
        run: |
          Get-ChildItem artifacts -Filter *.nupkg | ForEach-Object {
            dotnet nuget push $_.FullName `
              --api-key ${{ steps.nuget-login.outputs.NUGET_API_KEY }} `
              --source https://api.nuget.org/v3/index.json `
              --skip-duplicate
          }
